server:
  port: 8084

spring:
  application:
    name: booking-service

  kafka:
    # Mặc định là localhost cho tiền bối chạy IntelliJ,
    # nhưng khi chạy Docker nó sẽ bị đè bởi biến KAFKA_BOOTSTRAP_SERVERS
    bootstrap-servers: localhost:29092
    producer:
      key-serializer:
        org.apache.kafka.common.serialization.StringSerializer
        # SỬA DÒNG NÀY: Từ StringSerializer thành JsonSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      retries: 0
      properties:
        max.block.ms: 1000
        request.timeout.ms: 1000
        delivery.timeout.ms: 2000
        reconnect.backoff.ms: 500
        reconnect.backoff.max.ms: 1000
        metadata.max.age.ms: 1000

  datasource:
    url: jdbc:postgresql://ep-red-river-amkvj9tx-pooler.c-5.us-east-1.aws.neon.tech/booking_db?sslmode=require
    username: neondb_owner
    password: npg_1lr8XJZoFbMS
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          lob:
            non_contextual_creation: true

  flyway:
    enabled: false
  #    baseline-on-migrate: true
  #    locations: classpath:db/migration

  jackson:
    serialization:
      write-dates-as-timestamps: false
  management:
    endpoints:
      web:
        exposure:
          include: "*"

  logging:
    level:
      root: INFO
      org.springframework.web: INFO
      org.hibernate.SQL: DEBUG
      org.flywaydb: INFO

  springdoc:
    api-docs:
      path: /v3/api-docs
    swagger-ui:
      path: /swagger-ui.html
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/ # Địa chỉ của Eureka Server
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
