spring:
  config:
    activate:
      on-profile: dev
  devtools:
    add-properties: true
  cloud:
    gateway:
      routes:
        - id:   identify-service
#          uri: ${IDENTITY_SERVICE_URL:http://localhost:8081}
          uri: lb://IDENTITY-SERVICE
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - StripPrefix=2
            - name: Authentication
#            - RewritePath=/tours/(?<segment>.*), /$\{segment}
#            - CustomizeFilter
        - id: core-service
#          uri: ${CORE_SERVICE_URL:http://localhost:8082}
          uri: lb://core-service
          predicates:
            - Path=/core/**
#          filters:
#            - RewritePath=/cores/(?<segment>.*), /$\{segment}
#            - CustomizeFilter
 
        - id: search-service
#          uri: ${SEARCH_SERVICE_URL:http://localhost:8083}
          uri: lb://SEARCH-SERVICE
          predicates:
            - Path=/search/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 20 #  Sl nap mỗi giây ( 20 req/s)
                redis-rate-limiter.burstCapacity: 20 #  chứa tối đa  20 req trong 1 giây
                requested-tokens: 1
                key-resolver: "#{@ipKeyResolver}"
#          filters:
#            - RewritePath=/search/(?<segment>.*), /$\{segment}
#            - CustomizeFilter
        - id: booking-service
#          uri: ${BOOKING_SERVICE_URL:http://localhost:8084}
          uri: lb://BOOKING-SERVICE
          predicates:
            - Path=/api/v1/bookings/**, /bookings/**
          filters:
            - Authentication
#          filters:
#            - RewritePath=/bookings/(?<segment>.*), /$\{segment}
#            - CustomizeFilter
        - id: payment-service
#          uri: ${PAYMENT_SERVICE_URL:http://localhost:8085}
          uri: lb://PAYMENT-SERVICE
          predicates:
            - Path=/payments/**
          filters:
            - name: Authentication
#            - RewritePath=/payments/(?<segment>.*), /$\{segment} # thay thế ký tự /order/ thành /
        - id: support-service
#          uri: ${SUPPORT_SERVICE_URL:http://localhost:8086}
          uri: lb://SUPPORT-SERVICE
          predicates:
            - Path=/supports/**
#          filters:
#            - RewritePath=/supports/(?<segment>.*), /$\{segment} # thay thế ký tự /order/ thành /
#        - id: mail-service
#          uri: http://localhost:8087
#          predicates:
#            - Path=/mail/**, /v3/api-docs/mail-service
#          filters:
#            - RewritePath=/mail/(?<segment>.*), /$\{segment} # thay thế ký tự /mail/ thành /
#            - CustomizeFilter
        - id: notification-service
#          uri: ${NOTIFICATION_SERVICE_URL:http://localhost:8087}
          uri: lb://NOTIFICATION-SERVICE
          predicates:
            - Path=/notification/**
#          filters:
#            - RewritePath=/notification/(?<segment>.*), /$\{segment} # thay thế ký tự /mail/ thành /
#            - CustomizeFilter
        - id: ai-service
          uri: ${AI_SERVICE_URL:http://localhost:8000}
          predicates:
            - Path=/ai/**
          filters:
            - RewritePath=/ai/(?<segment>.*), /api/$\{segment}

        # ===== SWAGGER API DOCS ROUTING =====
        - id: identify-service-docs
          uri: ${IDENTITY_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/v3/api-docs/identify-service
          filters:
            - SetPath=/v3/api-docs

        - id: core-service-docs
          uri: ${CORE_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/v3/api-docs/core-service
          filters:
            - SetPath=/v3/api-docs

        - id: search-service-docs
          uri: ${SEARCH_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/v3/api-docs/search-service
          filters:
            - SetPath=/v3/api-docs

        - id: booking-service-docs
          uri: ${BOOKING_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/v3/api-docs/booking-service
          filters:
            - SetPath=/v3/api-docs

        - id: payment-service-docs
          uri: ${PAYMENT_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/v3/api-docs/payment-service
          filters:
            - SetPath=/v3/api-docs

        - id: support-service-docs
          uri: ${SUPPORT_SERVICE_URL:http://localhost:8086}
          predicates:
            - Path=/v3/api-docs/support-service
          filters:
            - SetPath=/v3/api-docs

        - id: notification-service-docs
          uri: ${NOTIFICATION_SERVICE_URL:http://localhost:8087}
          predicates:
            - Path=/v3/api-docs/notification-service
          filters:
            - SetPath=/v3/api-docs

        - id: ai-service-docs
          uri: ${AI_SERVICE_URL:http://localhost:8000}
          predicates:
            - Path=/v3/api-docs/ai-service
          filters:
            - SetPath=/openapi.json



springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - url: /v3/api-docs/identify-service
        name: Identity Service
      - url: /v3/api-docs/support-service
        name: Support Service
      - url: /v3/api-docs/core-service
        name: Core Service
      - url: /v3/api-docs/payment-service
        name: Payment Service
      - url: /v3/api-docs/search-service
        name: Search Service
      - url: /v3/api-docs/booking-service
        name: Booking Service
      - url: /v3/api-docs/notification-service
        name: Notification Service
      - url: /v3/api-docs/ai-service
        name: AI Service

