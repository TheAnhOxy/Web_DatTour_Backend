version: '3.8'


services:
  # 1. SEARCH ENGINE
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.1
    container_name: webtour-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false # Tắt SSL cho HTTP
      - xpack.security.transport.ssl.enabled=false # Tắt SSL cho giao tiếp nội bộ
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    healthcheck:
      test: [ "CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'" ]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "9200:9200"
    networks:
      - gotour-network

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.1
    container_name: kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://webtour-elasticsearch:9200
      - I18N_LOCALE=en
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - gotour-network

  # 2. MESSAGE BROKER (Dùng image của wurstmeister cho nhẹ và ổn định)
  zookeeper:
    image: wurstmeister/zookeeper:latest
    container_name: zookeeper
    ports:
      - "2181:2181"
    networks:
      - gotour-network

  kafka:
    image: wurstmeister/kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_ADVERTISED_HOST_NAME: localhost
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_CREATE_TOPICS: "tour-events:1:1" # Tạo sẵn topic cho bạn
    depends_on:
      - zookeeper
    networks:
      - gotour-network

  # 3. CACHING
  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - gotour-network

  # 4. MONITORING
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    # Tạm thời comment volumes nếu bạn chưa tạo file prometheus.yml để tránh lỗi khởi động
    # volumes:
    #   - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - gotour-network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    networks:
      - gotour-network

  # 5. TRACING
  zipkin:
    image: openzipkin/zipkin:latest
    container_name: zipkin
    ports:
      - "9411:9411"
    networks:
      - gotour-network

networks:
  gotour-network:
    driver: bridge