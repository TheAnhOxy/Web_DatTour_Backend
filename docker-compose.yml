services:

  # =====================
  # ELASTIC STACK
  # =====================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.1
    container_name: webtour-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    networks:
      - gotour-network

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.1
    container_name: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://webtour-elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - gotour-network


  # =====================
  # KAFKA STACK
  # =====================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"
    networks:
      - gotour-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"   # Cổng nội bộ (cho Docker sau này)
      - "29092:29092" # Cổng bên ngoài (cho IntelliJ hiện tại)
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Lắng nghe trên tất cả các interface của container
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      # Quảng bá địa chỉ để Client biết đường mà tìm
      # PLAINTEXT: dành cho các container trong Docker network (dùng hostname 'kafka')
      # PLAINTEXT_HOST: dành cho ứng dụng chạy local bên ngoài Docker
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      # Tự động tạo topic nếu chưa có (để đỡ lỗi Topic not present)
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - gotour-network


  # =====================
  # CACHE
  # =====================
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - gotour-network


  # =====================
  # MONITORING
  # =====================
  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    networks:
      - gotour-network

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3000:3000"
    networks:
      - gotour-network

  zipkin:
    image: openzipkin/zipkin
    container_name: zipkin
    ports:
      - "9411:9411"
    networks:
      - gotour-network


  # =====================
  # MICROSERVICES
  # =====================

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      - IDENTITY_SERVICE_URL=http://identity-service:8081
      - CORE_SERVICE_URL=http://core-service:8082
      - SEARCH_SERVICE_URL=http://search-service:8083
      - BOOKING_SERVICE_URL=http://booking-service:8084
      - PAYMENT_SERVICE_URL=http://payment-service:8085
      - SUPPORT_SERVICE_URL=http://support-service:8086
      - NOTIFICATION_SERVICE_URL=http://notification-service:8087
    depends_on:
      - identity-service
      - core-service
      - search-service
    networks:
      - gotour-network


  identity-service:
    build: ./identity-service
    container_name: identity-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_REDIS_HOST=redis
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      - redis
      - kafka
    networks:
      - gotour-network


  core-service:
    build: ./core-service
    container_name: core-service
    ports:
      - "8082:8082"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      - kafka
    networks:
      - gotour-network


  search-service:
    build: ./search-service
    container_name: search-service
    ports:
      - "8083:8083"
    environment:
      - SPRING_ELASTICSEARCH_URIS=http://webtour-elasticsearch:9200
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      - elasticsearch
      - kafka
    networks:
      - gotour-network


  booking-service:
    build: ./booking-service
    container_name: booking-service
    ports:
      - "8084:8084"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - REDIS_HOST=redis
    depends_on:
      - redis
      - kafka
    networks:
      - gotour-network


  payment-service:
    build: ./payment-service
    container_name: payment-service
    ports:
      - "8085:8085"
    networks:
      - gotour-network


  support-service:
    build: ./support-service
    container_name: support-service
    ports:
      - "8086:8086"
    networks:
      - gotour-network


  notification-service:
    build: ./notification-service
    container_name: notification-service
    ports:
      - "8087:8087"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      - kafka
    networks:
      - gotour-network


networks:
  gotour-network:
    driver: bridge