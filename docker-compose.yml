services:

  # =====================
  # ELASTIC STACK
  # =====================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.1
    container_name: webtour-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms256m -Xmx512m
    networks:
      - gotour-network

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.1
    container_name: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://webtour-elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - gotour-network


  # =====================
  # KAFKA STACK
  # =====================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - gotour-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Lắng nghe trên tất cả các interface của container
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      # Quảng bá địa chỉ dùng hostname 'kafka' cho các container trong Docker network
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_JVM_PERFORMANCE_OPTS: "-Xms256m -Xmx512m"
    networks:
      - gotour-network


  # =====================
  # CACHE
  # =====================
  redis:
    image: redis:7-alpine
    container_name: redis
    networks:
      - gotour-network


  # =====================
  # MONITORING
  # =====================
  prometheus:
    image: prom/prometheus
    container_name: prometheus
    networks:
      - gotour-network

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3000:3000"
    networks:
      - gotour-network

  zipkin:
    image: openzipkin/zipkin
    container_name: zipkin
    networks:
      - gotour-network


  # =====================
  # MICROSERVICES
  # =====================

  discovery-service:
    build: ./discovery-service
    image: be-discovery-service-custom
    container_name: discovery-service
    restart: always
    environment:
      - JAVA_TOOL_OPTIONS=-Xms128m -Xmx256m
    networks:
      - gotour-network

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    restart: always
    ports:
      - "8080:8080"
    environment:
      - IDENTITY_SERVICE_URL=http://identity-service:8081
      - CORE_SERVICE_URL=http://core-service:8082
      - SEARCH_SERVICE_URL=http://search-service:8083
      - BOOKING_SERVICE_URL=http://booking-service:8084
      - PAYMENT_SERVICE_URL=http://payment-service:8085
      - SUPPORT_SERVICE_URL=http://support-service:8086
      - NOTIFICATION_SERVICE_URL=http://notification-service:8087
      - AI_SERVICE_URL=http://ai-service:8000
      - SPRING_REDIS_HOST=redis
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - JAVA_TOOL_OPTIONS=-Xms128m -Xmx256m
    depends_on:
      - identity-service
      - core-service
      - search-service
      - ai-service
      - redis
    networks:
      - gotour-network


  identity-service:
    build: ./Identity-service
    container_name: identity-service
    restart: always
    environment:
      - SPRING_REDIS_HOST=redis
      - SPRING_DATA_REDIS_HOST=redis
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - JAVA_TOOL_OPTIONS=-Xms128m -Xmx256m
    depends_on:
      - redis
      - kafka
    networks:
      - gotour-network


  core-service:
    build: ./Core-service
    container_name: core-service
    restart: always
    environment:
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - JAVA_TOOL_OPTIONS=-Xms128m -Xmx256m
    depends_on:
      - kafka
      - redis
    networks:
      - gotour-network


  search-service:
    build: ./Search-service
    container_name: search-service
    restart: always
    environment:
      - SPRING_ELASTICSEARCH_URIS=http://webtour-elasticsearch:9200
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - JAVA_TOOL_OPTIONS=-Xms128m -Xmx256m
    depends_on:
      - elasticsearch
      - kafka
    networks:
      - gotour-network


  booking-service:
    build: ./Booking-service
    container_name: booking-service
    restart: always
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - REDIS_HOST=redis
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - JAVA_TOOL_OPTIONS=-Xms128m -Xmx256m
    depends_on:
      - redis
      - kafka
    networks:
      - gotour-network


  payment-service:
    build: ./Payment-service
    container_name: payment-service
    restart: always
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - JAVA_TOOL_OPTIONS=-Xms128m -Xmx256m
    depends_on:
      - kafka
    networks:
      - gotour-network


  support-service:
    build: ./Support-service
    container_name: support-service
    restart: always
    environment:
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - JAVA_TOOL_OPTIONS=-Xms128m -Xmx256m
    networks:
      - gotour-network


  notification-service:
    build: ./Notification-service
    container_name: notification-service
    restart: always
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - JAVA_TOOL_OPTIONS=-Xms128m -Xmx256m
    depends_on:
      - kafka
    networks:
      - gotour-network


  ai-service:
    build: ./Ai-service
    container_name: ai-service
    restart: always
    environment:
      - REDIS_HOST=redis
      - REDIS_URL=redis://redis:6379/0
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SEARCH_SERVICE_URL=http://search-service:8083/search/tours
    depends_on:
      - redis
      - kafka
    networks:
      - gotour-network


  # (webtour-postgres removed as requested)

networks:
  gotour-network:
    driver: bridge