version: '3.8'


services:
  # 1. SEARCH ENGINE
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.1
    container_name: webtour-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false # Tắt SSL cho HTTP
      - xpack.security.transport.ssl.enabled=false # Tắt SSL cho giao tiếp nội bộ
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    healthcheck:
      test: [ "CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'" ]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "9200:9200"
    networks:
      - gotour-network

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.1
    container_name: kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://webtour-elasticsearch:9200
      - I18N_LOCALE=en
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - gotour-network

  # 2. MESSAGE BROKER (Dùng image của wurstmeister cho nhẹ và ổn định)
  zookeeper:
    image: wurstmeister/zookeeper:latest
    container_name: zookeeper
    ports:
      - "2181:2181"
    networks:
      - gotour-network

  kafka:
    image: wurstmeister/kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_ADVERTISED_HOST_NAME: localhost
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_CREATE_TOPICS: "tour-events:1:1" # Tạo sẵn topic cho bạn
    depends_on:
      - zookeeper
    networks:
      - gotour-network

  # 3. CACHING
  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - gotour-network

  # 4. MONITORING
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    # Tạm thời comment volumes nếu bạn chưa tạo file prometheus.yml để tránh lỗi khởi động
    # volumes:
    #   - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - gotour-network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    networks:
      - gotour-network

  # 5. TRACING
  zipkin:
    image: openzipkin/zipkin:latest
    container_name: zipkin
    ports:
      - "9411:9411"
    networks:
      - gotour-network


 # service
  # --- 1. GATEWAY & CORE SERVICES ---
  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      - IDENTITY_SERVICE_URL=http://identity-service:8081
      - CORE_SERVICE_URL=http://core-service:8082
      - SEARCH_SERVICE_URL=http://search-service:8083
      - BOOKING_SERVICE_URL=http://booking-service:8084
      - PAYMENT_SERVICE_URL=http://payment-service:8085
      - SUPPORT_SERVICE_URL=http://support-service:8086
      - NOTIFICATION_SERVICE_URL=http://notification-service:8087
    networks:
      - gotour-network

  identity-service:
    build: ./identity-service
    container_name: identity-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/identity_db
      - SPRING_REDIS_HOST=redis
    depends_on:
      - redis
    networks:
      - gotour-network

  core-service:
    build: ./core-service
    container_name: core-service
    ports:
      - "8082:8082"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/core_db
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      - kafka
    networks:
      - gotour-network

  # --- 2. SEARCH & BOOKING SERVICES ---
  search-service:
    build: ./search-service
    container_name: search-service
    ports:
      - "8083:8083"
    environment:
      - SPRING_ELASTICSEARCH_URIS=http://webtour-elasticsearch:9200
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - gotour-network

  booking-service:
    build: ./booking-service
    container_name: booking-service
    ports:
      - "8084:8084"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/booking_db
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - REDIS_HOST=redis
    depends_on:
      - redis
      - kafka
    networks:
      - gotour-network

  # --- 3. PAYMENT & SUPPORT SERVICES ---
  payment-service:
    build: ./payment-service
    container_name: payment-service
    ports:
      - "8085:8085"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/payment_db
    networks:
      - gotour-network

  support-service:
    build: ./support-service
    container_name: support-service
    ports:
      - "8086:8086"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb+srv://theanh123:theanh123@cluster.mongodb.net/tour_db
    networks:
      - gotour-network

  # --- 4. NOTIFICATION SERVICE ---
  notification-service:
    build: ./notification-service
    container_name: notification-service
    ports:
      - "8087:8087"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      - kafka
    networks:
      - gotour-network



networks:
  gotour-network:
    driver: bridge